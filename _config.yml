title: "FWC | Under the cloud"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

# Math Support
markdown: kramdown
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Collections
collections:
  hardware:
    output: true
    permalink: /hardware/:path/
  photography:
    output: true
    permalink: /photography/:path/

# Global Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "single"
      author_profile: true
      mathjax: truei
